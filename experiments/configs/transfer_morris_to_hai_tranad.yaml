name: transfer_morris_to_hai_tranad
data:
  source_dataset: morris
  target_dataset: hai
  window: 60
  stride: 10
  val_frac: 0.15
  seed: 42
model:
  name: tranad
  params:
    d_model: 32
    n_heads: 4
    ff_dim: 64
    dropout: 0.1
train:
  epochs: 30
  batch_size: 64
  learning_rate: 0.0001
  device: cuda
eval:
  threshold_method: val_percentile
  val_percentile: 99.0
  metrics: [pointwise, point_adjust, etapr]
seeds: [42]
