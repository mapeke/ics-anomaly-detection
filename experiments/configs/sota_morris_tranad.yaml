name: sota_morris_tranad
data:
  dataset: morris
  window: 30
  stride: 5
  val_frac: 0.15
  seed: 42
model:
  name: tranad
  params:
    d_model: 64
    n_heads: 4
    ff_dim: 128
    dropout: 0.1
train:
  epochs: 30
  batch_size: 128
  learning_rate: 0.0001
  device: cuda
eval:
  threshold_method: val_percentile
  val_percentile: 99.0
  metrics: [pointwise, point_adjust, etapr]
seeds: [42, 7, 123]
