name: transfer_hai_to_morris_isolation_forest
data:
  source_dataset: hai
  target_dataset: morris
  val_frac: 0.15
  seed: 42
  subsample_train: 100000
model:
  name: isolation_forest
  params:
    n_estimators: 200
train:
  device: cpu
eval:
  threshold_method: val_percentile
  val_percentile: 99.0
  metrics: [pointwise, point_adjust, etapr]
seeds: [42, 7, 123]
