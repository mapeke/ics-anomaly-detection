name: baseline_hai_lstm_ae
data:
  dataset: hai
  window: 60
  stride: 10
  val_frac: 0.15
  seed: 42
  subsample_train: 30000   # number of windows (not rows) for CPU tractability
model:
  name: lstm_ae
  params:
    hidden_dim: 64
    latent_dim: 32
train:
  epochs: 10
  batch_size: 256
  learning_rate: 0.001
  device: cpu
eval:
  threshold_method: val_percentile
  val_percentile: 99.0
  metrics: [pointwise, point_adjust, etapr]
seeds: [42]
notes: |
  Phase-1 reproducibility checkpoint. Compare eTaPR F1 to Shin et al.
  USENIX CSET 2020 (HAI 1.0) within ±0.05 (informal sanity check; HAI
  21.03 has a different attack set from 20.07 so strict repro isn't
  possible without the 20.07 split).
