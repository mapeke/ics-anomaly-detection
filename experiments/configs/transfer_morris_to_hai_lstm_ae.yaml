name: transfer_morris_to_hai_lstm_ae
data:
  source_dataset: morris
  target_dataset: hai
  window: 60
  stride: 10
  val_frac: 0.15
  seed: 42
model:
  name: lstm_ae
  params:
    hidden_dim: 32
    latent_dim: 16
train:
  epochs: 10
  batch_size: 256
  learning_rate: 0.001
  device: cpu
eval:
  threshold_method: val_percentile
  val_percentile: 99.0
  metrics: [pointwise, point_adjust, etapr]
seeds: [42]
