name: baseline_morris_dense_ae
data:
  dataset: morris
  val_frac: 0.15
  seed: 42
model:
  name: dense_ae
  params:
    hidden: [64, 32, 16, 32, 64]
train:
  epochs: 25
  batch_size: 256
  learning_rate: 0.001
  device: cpu
eval:
  threshold_method: val_percentile
  val_percentile: 99.0
  metrics: [pointwise, point_adjust, etapr]
seeds: [42]
