<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ICS Anomaly Detection — External Validation</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>ICS Anomaly Detection</h1>
    <p class="sub">External validation — upload an unseen Morris gas-pipeline file and score it against a trained model artifact.</p>
  </header>

  <main>
    <section class="card">
      <h2>1. Select artifact</h2>
      <label for="artifact">Saved artifact:</label>
      <select id="artifact"></select>
      <div id="artifact-info" class="muted"></div>
    </section>

    <section class="card">
      <h2>2. Upload dataset</h2>
      <p class="muted">Accepted: <code>.arff</code> or <code>.csv</code>. Max 50 MB.</p>
      <form id="score-form">
        <div class="row">
          <label for="adapter">Adapter:</label>
          <select id="adapter" name="adapter">
            <option value="morris_gas">morris_gas (IanArffDataset.arff schema)</option>
            <option value="generic_arff">generic_arff (variant-driven projection)</option>
          </select>
        </div>
        <div id="variant-row" class="row hidden">
          <label for="variant">Variant:</label>
          <select id="variant" name="variant"></select>
          <div id="variant-info" class="muted"></div>
        </div>
        <div class="row">
          <label for="file">File:</label>
          <input type="file" id="file" name="file" accept=".arff,.csv,.txt" required />
        </div>
        <div class="row">
          <label for="recalibrate">
            <input type="checkbox" id="recalibrate" />
            Recalibrate threshold on uploaded data (target_val_percentile)
          </label>
          <label for="percentile" class="inline">percentile:
            <input type="number" id="percentile" value="99" min="50" max="99.99" step="0.1" />
          </label>
        </div>
        <button type="submit" id="submit-btn">Score</button>
      </form>
      <div id="status" class="status"></div>
    </section>

    <section id="results" class="card hidden">
      <h2>3. Results</h2>
      <div id="summary"></div>
      <h3>Metrics</h3>
      <div id="metrics"></div>
      <h3>Preview (first 50 rows)</h3>
      <div id="preview"></div>
      <p><a id="download" href="#" download>Download full scores (parquet)</a></p>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
